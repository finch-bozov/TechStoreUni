{% extends "store/base.html" %}

{% load static %}

{% block content %}

<div class="row g-4">
    {% for product in products %}
        <div class="col-md-4">
            <div class="card mb-4">
                {% if product.image %}
                    <img src="{{ product.image }}" class="card-img-top">
                {% else %}
                    <img src="{% static 'images/default.jpg' %}" class="card-img-top">
                {% endif %}

                <div class="card-body">
                    <h5>{{ product.name }}</h5>
                    <p>${{ product.price }}</p>

                    <a href="/product/{{ product.id }}/" class="btn btn-primary">View</a>
                    <a href="{% url 'add_to_cart' product.id %}" class="btn btn-success">
                        Add to Cart
                    </a>
                </div>
            </div>
        </div>
    {% endfor %}
</div>

{% endblock %}
